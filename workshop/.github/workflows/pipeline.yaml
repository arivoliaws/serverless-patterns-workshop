name: SAM Pipeline

on:
  push:
    branches: [main, '**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  SAM_CLI_TELEMETRY: 0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - run: sam build
      - uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::863035634805:role/github-actions-serverless-workshop-dev
          aws-region: ${{ env.AWS_REGION }}
      - run: sam deploy --config-env dev --no-confirm-changeset

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::863035634805:role/github-actions-serverless-workshop-prod
          aws-region: ${{ env.AWS_REGION }}
      - run: sam deploy --config-env prod --no-confirm-changeset
