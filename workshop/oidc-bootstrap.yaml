AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC bootstrap - creates IAM roles for dev and prod deployments

Parameters:
  GitHubOrg:
    Type: String
    Default: arivoliaws
  GitHubRepo:
    Type: String
    Default: serverless-patterns-workshop
  OIDCProviderArn:
    Type: String
    Default: ""
    Description: Existing GitHub OIDC provider ARN (leave empty to create one)

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, ""]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DevDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-serverless-workshop-dev
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  ProdDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-serverless-workshop-prod
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

Outputs:
  DevRoleArn:
    Value: !GetAtt DevDeployRole.Arn
    Description: IAM Role ARN for dev deployments
  ProdRoleArn:
    Value: !GetAtt ProdDeployRole.Arn
    Description: IAM Role ARN for prod deployments (main branch only)
  OIDCProviderArn:
    Value: !If
      - CreateOIDCProvider
      - !Ref GitHubOIDCProvider
      - !Ref OIDCProviderArn
