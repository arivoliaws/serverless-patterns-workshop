version = 0.1

[default.global.parameters]
stack_name = "serverless-workshop"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
region = "us-west-2"

[dev.deploy.parameters]
stack_name = "serverless-workshop-dev"
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
region = "us-west-2"

[prod.deploy.parameters]
stack_name = "serverless-workshop-prod"
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
region = "us-west-2"
